name: Deploy React App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Show all files
        run: ls -la
      
      - name: Show client folder
        run: |
          if [ -d "client" ]; then
            echo "✅ client folder exists!"
            ls -la client
          else
            echo "❌ client folder NOT found!"
            ls -la
            exit 1
          fi
      
      - name: Show package.json
        run: |
          if [ -f "client/package.json" ]; then
            echo "✅ package.json exists!"
            cat client/package.json
          else
            echo "❌ package.json NOT found!"
            exit 1
          fi
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install Dependencies
        run: |
          cd client
          npm install
      
      - name: Build
        run: |
          cd client
          npm run build
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
